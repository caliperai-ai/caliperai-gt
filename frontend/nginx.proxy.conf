# Production Nginx Configuration for behind reverse proxy
# SSL is handled by the system nginx, this handles HTTP only

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with timing and upstream info
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    server_tokens off;
    
    # HTTP2 settings for better streaming
    http2_max_field_size 16k;
    http2_max_header_size 32k;
    http2_max_requests 10000;  # Allow more requests per connection

    # Buffer sizes
    client_body_buffer_size 16K;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 32k;

    # Timeouts (increased for large uploads)
    client_body_timeout 300s;    # 5 minutes to start upload
    client_header_timeout 60s;
    send_timeout 300s;           # 5 minutes between send operations
    
    # Keep connections alive longer for streaming uploads
    keepalive_timeout 120s;
    keepalive_requests 1000;

    # File upload limit (10GB for large datasets)
    client_max_body_size 10G;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_buffers 16 8k;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Upstream backend with keepalive
    upstream backend {
        server backend:8000;
        keepalive 64;
    }

    # Main HTTP server (SSL handled by reverse proxy)
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Document root
        root /usr/share/nginx/html;
        index index.html;

        # Get forwarded protocol from reverse proxy
        set $forwarded_proto $scheme;
        if ($http_x_forwarded_proto != "") {
            set $forwarded_proto $http_x_forwarded_proto;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

        # Connection limits
        limit_conn conn_limit 50;

        # High-speed data endpoint - NO rate limiting for images/lidar
        location /api/v1/data/ {
            # No rate limiting for data files
            proxy_pass http://backend/api/v1/data/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;

            # Stream directly without buffering
            proxy_buffering off;
            proxy_request_buffering off;

            # Timeouts for large files
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }


        # API proxy
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Request-ID $request_id;

            # Timeouts for long-running requests
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 32k;
            proxy_busy_buffers_size 64k;

            # Don't cache API responses
            proxy_cache off;
        }

        # Login endpoint with stricter rate limiting
        location /api/v1/auth/login {
            limit_req zone=login_limit burst=5 nodelay;

            proxy_pass http://backend/api/v1/auth/login;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        # Upload endpoints with specific rate limiting
        location ~ ^/api/v1/(import|upload)/ {
            limit_req zone=upload_limit burst=5 nodelay;
            client_max_body_size 10G;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;

            # Extended timeouts for large uploads (increased for 150+ images)
            proxy_connect_timeout 120s;
            proxy_send_timeout 7200s;  # 2 hours for large uploads
            proxy_read_timeout 7200s;   # 2 hours for processing
            
            # Disable buffering for uploads to stream directly
            proxy_request_buffering off;
            proxy_buffering off;
            
            # Keep connection alive
            proxy_socket_keepalive on;
        }

        # WebSocket support
        location /ws/ {
            proxy_pass http://backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_read_timeout 86400s;
        }

        # Runtime branding: served from a writable tmpfs (the container rootfs is
        # read-only), regenerated from BRAND_* env on startup by
        # docker-entrypoint.d/10-brand.sh. Exact match beats the .js regex below;
        # never cache so a re-brand takes effect on the next page load.
        location = /brand-config.js {
            root /var/brand;
            default_type application/javascript;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            expires -1;
        }

        # Runtime feature flags: same mechanism as /brand-config.js above,
        # regenerated from FEATURE_* env on startup by
        # docker-entrypoint.d/20-features.sh. Never cache so a flag change takes
        # effect on the next page load.
        location = /feature-config.js {
            root /var/brand;
            default_type application/javascript;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            expires -1;
        }

        # Cache static assets aggressively (but not API responses)
        location ~* ^(?!/api/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # index.html - no cache for SPA updates
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # SPA routing - serve index.html for all routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Block access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Block access to source maps (.map files)
        location ~* \.map$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Block access to source files that should never be served
        location ~* \.(ts|tsx|jsx|scss|sass|less|md|txt|log|sh|py|sql)$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Block common sensitive files
        location ~* (package\.json|tsconfig\.json|vite\.config|\.(env|git|svn|htaccess|htpasswd))$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
